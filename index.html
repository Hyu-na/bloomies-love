let GLOBAL_PATHS = [];

// =========================
// LOAD STORIES
// =========================

async function loadStories() {

  document.getElementById("stories").innerHTML = "";

  let res = await fetch(
    `https://api.github.com/repos/${USER}/${REPO}/git/trees/main?recursive=1`
  );

  let data = await res.json();

  if(!data.tree) {
    console.log(data);
    return;
  }

  let paths = data.tree.map(x => x.path);

  GLOBAL_PATHS = paths;

  let stories = {};

  paths.forEach(path => {

    if(path.startsWith("stories/")) {

      let parts = path.split("/");

      if(parts.length >= 2) {
        stories[parts[1]] = true;
      }

    }

  });

  GLOBAL_STORIES = Object.keys(stories);

  displayStories(GLOBAL_STORIES);
}

// =========================
// DISPLAY STORIES
// =========================

function displayStories(storyList) {

  document.getElementById("stories").innerHTML = "";

  storyList.forEach(story => {

    let btn = document.createElement("button");

    btn.className = "storyButton";

    btn.innerText = story;

    btn.onclick = () => loadStory(story);

    document.getElementById("stories").appendChild(btn);

  });

}

// =========================
// SEARCH SYSTEM
// =========================

const searchBar = document.getElementById("searchBar");
const searchResults = document.getElementById("searchResults");

searchBar.addEventListener("input", () => {

  let value = searchBar.value.toLowerCase().trim();

  // clear dropdown
  searchResults.innerHTML = "";

  // if empty → show all stories again
  if(value === "") {
    displayStories(GLOBAL_STORIES);
    return;
  }

  // filter stories
  let filtered = GLOBAL_STORIES.filter(story =>
    story.toLowerCase().includes(value)
  );

  // update left panel list
  displayStories(filtered);

  // create clickable suggestions (dropdown)
  filtered.forEach(story => {

    let item = document.createElement("div");

    item.className = "searchItem";

    item.innerText = story;

    item.onclick = () => {

      // load selected story instantly
      loadStory(story);

      // clean dropdown
      searchResults.innerHTML = "";

      // put selected text in search bar
      searchBar.value = story;

    };

    searchResults.appendChild(item);

  });

});

// =========================
// LOAD STORY
// =========================

function loadStory(story) {

  document.getElementById("content").innerHTML = "";

  let chapters = {};

  GLOBAL_PATHS.forEach(path => {

    if(path.startsWith(`stories/${story}/`)) {

      let parts = path.split("/");

      if(parts.length >= 3) {
        chapters[parts[2]] = true;
      }

    }

  });

  let sortedChapters = Object.keys(chapters).sort((a,b) => {
    return a.localeCompare(b, undefined, {
      numeric: true,
      sensitivity: 'base'
    });
  });

  sortedChapters.forEach(chap => {

    let chapterDiv = document.createElement("div");

    chapterDiv.className = "chapter";

    let title = document.createElement("div");

    title.className = "chapterTitle";

    title.innerText = `Chapter ${chap}`;

    chapterDiv.appendChild(title);

    let chapterImages = GLOBAL_PATHS.filter(path =>

      path.startsWith(`stories/${story}/${chap}/`) &&

      (
        path.endsWith(".jpg") ||
        path.endsWith(".jpeg") ||
        path.endsWith(".png") ||
        path.endsWith(".webp")
      )

    );

    chapterImages.sort((a,b) => {

      return a.localeCompare(b, undefined, {
        numeric: true,
        sensitivity: 'base'
      });

    });

    chapterImages.forEach(path => {

      let img = document.createElement("img");

      img.loading = "lazy";

      img.src = `https://raw.githubusercontent.com/${USER}/${REPO}/main/${path}`;

      img.onerror = () => {
        img.remove();
      }

      chapterDiv.appendChild(img);

    });

    let pdf = document.createElement("iframe");

    pdf.src = `https://raw.githubusercontent.com/${USER}/${REPO}/main/stories/${story}/${chap}/${chap}.pdf`;

    chapterDiv.appendChild(pdf);

    document.getElementById("content").appendChild(chapterDiv);

  });

}

// =========================
// FILE TO BASE64
// =========================

function toBase64(file) {

  return new Promise((resolve, reject) => {

    const reader = new FileReader();

    reader.readAsDataURL(file);

    reader.onload = () => {
      resolve(reader.result.split(',')[1]);
    }

    reader.onerror = error => reject(error);

  });

}

// =========================
// UPLOAD CHAPTER
// =========================

async function uploadChapter() {

  const story = document.getElementById("storyName").value.trim();

  const chapter = document.getElementById("chapterName").value.trim();

  const files = document.getElementById("imageUpload").files;

  if(!story || !chapter || files.length === 0) {
    alert("Fill everything.");
    return;
  }

  document.getElementById("loading").style.display = "block";

  let sortedFiles = Array.from(files).sort((a,b) => {

    return a.name.localeCompare(b.name, undefined, {
      numeric: true,
      sensitivity: 'base'
    });

  });

  for(let i = 0; i < sortedFiles.length; i++) {

    const file = sortedFiles[i];

    const extension = file.name.split('.').pop().toLowerCase();

    const base64 = await toBase64(file);

    let path;

    if(extension === "pdf") {
      path = `stories/${story}/${chapter}/${chapter}.pdf`;
    } else {
      path = `stories/${story}/${chapter}/${i+1}.${extension}`;
    }

    await fetch(
      `https://api.github.com/repos/${USER}/${REPO}/contents/${path}`,
      {

        method: 'PUT',

        headers: {
          Authorization: `token ${GITHUB_TOKEN}`,
          'Content-Type': 'application/json'
        },

        body: JSON.stringify({
          message: `Upload ${path}`,
          content: base64
        })

      }
    );

  }

  document.getElementById("loading").style.display = "none";

  alert("Chapter uploaded successfully!");

  closeAdmin();

function startApp() {
  loadStories();
