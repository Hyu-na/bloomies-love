<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Webtoon Platform Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

header {
  background: black;
  padding: 15px;
  text-align: center;
}

#layout {
  display: flex;
}

#stories {
  width: 220px;
  background: #111;
  height: 100vh;
  overflow-y: auto;
  padding: 10px;
}

button {
  width: 100%;
  margin-bottom: 5px;
  padding: 10px;
  background: #ff2e63;
  border: none;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

#content {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
  height: 100vh;
}

img {
  width: 100%;
  margin-bottom: 10px;
  border-radius: 8px;
}

iframe {
  width: 100%;
  height: 700px;
  border: none;
  border-radius: 10px;
}
</style>
</head>

<body>

<script>
let password = prompt("Mot de passe ?");
if(password !== "Cortis0325") {
  document.body.innerHTML = "Accès refusé";
}
</script>

<header>📚 Webtoon Platform Pro</header>

<div id="layout">
  <div id="stories"></div>
  <div id="content"></div>
</div>

<script>

const USER = "Hyu-na";
const REPO = "bloomies-love";

async function loadStories() {

  let res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/git/trees/main?recursive=1`);
  let data = await res.json();

  let paths = data.tree.map(x => x.path);

  let stories = {};

  paths.forEach(p => {
    if(p.startsWith("stories/")) {
      let parts = p.split("/");
      if(parts.length >= 2) {
        stories[parts[1]] = true;
      }
    }
  });

  Object.keys(stories).forEach(story => {

    let btn = document.createElement("button");
    btn.innerText = story;

    btn.onclick = () => loadStory(paths, story);

    document.getElementById("stories").appendChild(btn);
  });
}

function loadStory(paths, story) {

  document.getElementById("content").innerHTML = "";

  let chapters = {};

  paths.forEach(p => {
    if(p.includes(`stories/${story}/`)) {
      let parts = p.split("/");
      if(parts.length >= 3) {
        chapters[parts[2]] = true;
      }
    }
  });

  Object.keys(chapters).forEach(chap => {

    let div = document.createElement("div");

    let title = document.createElement("h2");
    title.innerText = "Chapitre " + chap;
    div.appendChild(title);

    let hasImage = false;

    // 🖼️ IMAGES
    for(let i=1; i<=50; i++) {
      let img = document.createElement("img");
      img.src = `https://raw.githubusercontent.com/${USER}/${REPO}/main/stories/${story}/${chap}/${i}.jpg`;

      img.onload = () => hasImage = true;
      img.onerror = () => img.remove();

      div.appendChild(img);
    }

    // 📄 PDF (fallback)
    let pdf = document.createElement("iframe");
pdf.src = `https://raw.githubusercontent.com/${USER}/${REPO}/main/stories/${story}/${chap}/${chap}.pdf`;
    setTimeout(() => {
      if(!hasImage) {
        div.appendChild(pdf);
      }
    }, 300);

    document.getElementById("content").appendChild(div);
  });
}

loadStories();

</script>

</body>
</html>
