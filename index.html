<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Webtoon Platform</title>

<style>

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
  overflow: hidden;
}

header {
  background: #000;
  padding: 15px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid #222;
}

header h1 {
  margin: 0;
  font-size: 22px;
}

#searchBar {
  width: 250px;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #1a1a1a;
  color: white;
  outline: none;
}

#layout {
  display: flex;
  height: calc(100vh - 70px);
}

#stories {
  width: 260px;
  background: #111;
  overflow-y: auto;
  padding: 10px;
  border-right: 1px solid #222;
}

.storyButton {
  width: 100%;
  margin-bottom: 8px;
  padding: 12px;
  background: #ff2e63;
  border: none;
  color: white;
  border-radius: 10px;
  cursor: pointer;
  font-size: 15px;
  transition: 0.2s;
}

.storyButton:hover {
  background: #ff4d7f;
}

#content {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
}

.chapter {
  margin-bottom: 50px;
}

.chapterTitle {
  font-size: 24px;
  margin-bottom: 20px;
  border-bottom: 2px solid #ff2e63;
  padding-bottom: 10px;
}

img {
  width: 100%;
  display: block;
  margin: 0;
  padding: 0;
  border: none;
}

iframe {
  width: 100%;
  height: 800px;
  border: none;
  border-radius: 10px;
}

#adminButton {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #ff2e63;
  color: white;
  padding: 15px 20px;
  border-radius: 50px;
  cursor: pointer;
  z-index: 9999;
  font-weight: bold;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

#adminPanel {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #111;
  width: 400px;
  padding: 25px;
  border-radius: 20px;
  z-index: 10000;
  box-shadow: 0 0 40px black;
}

.adminInput {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  background: #1b1b1b;
  border: none;
  color: white;
  border-radius: 10px;
}

.adminButton {
  width: 100%;
  padding: 12px;
  border: none;
  background: #ff2e63;
  color: white;
  border-radius: 10px;
  cursor: pointer;
  margin-bottom: 10px;
}

#loading {
  position: fixed;
  top: 20px;
  right: 20px;
  background: #ff2e63;
  padding: 10px 15px;
  border-radius: 10px;
  display: none;
  z-index: 99999;
}

</style>
</head>

<body>

<div id="loading">Uploading...</div>

<script>
let password = prompt("Mot de passe ?");
if(password !== "MartinCortis") {
  document.body.innerHTML = "<h1 style='text-align:center;margin-top:100px;'>Accès refusé</h1>";
}
</script>

<header>
  <h1>Private Webtoon Platform</h1>
  <input type="text" id="searchBar" placeholder="Search a story...">
</header>

<div id="layout">
  <div id="stories"></div>
  <div id="content"></div>
</div>

<div id="adminButton">ADMIN</div>

<div id="adminPanel">

  <h2>Admin Upload</h2>

  <input id="storyName" class="adminInput" placeholder="Story Name">
  <input id="chapterName" class="adminInput" placeholder="Chapter Number">
  <input type="file" id="imageUpload" multiple accept="image/*" class="adminInput">

  <button class="adminButton" onclick="uploadChapter()">Upload Chapter</button>

  <button class="adminButton" onclick="deleteChapterUI()">Delete Chapter</button>
  <button class="adminButton" onclick="deleteStoryUI()">Delete Story</button>

  <button class="adminButton" onclick="closeAdmin()">Close</button>

</div>

<script>

const USER = "Hyu-na";
const REPO = "bloomies-love";
const GITHUB_TOKEN = "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";

let GLOBAL_PATHS = [];
let GLOBAL_STORIES = [];

// -------------------- LOAD STORIES --------------------

async function loadStories() {
  let res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/git/trees/main?recursive=1`);
  let data = await res.json();
  let paths = data.tree.map(x => x.path);

  GLOBAL_PATHS = paths;

  let stories = {};
  paths.forEach(path => {
    if(path.startsWith("stories/")) {
      let parts = path.split("/");
      if(parts.length >= 2) stories[parts[1]] = true;
    }
  });

  GLOBAL_STORIES = Object.keys(stories);
  displayStories(GLOBAL_STORIES);
}

function displayStories(list) {
  document.getElementById("stories").innerHTML = "";
  list.forEach(story => {
    let btn = document.createElement("button");
    btn.className = "storyButton";
    btn.innerText = story;
    btn.onclick = () => loadStory(story);
    document.getElementById("stories").appendChild(btn);
  });
}

const searchBar = document.getElementById("searchBar");
searchBar.addEventListener("input", () => {
  let v = searchBar.value.toLowerCase();
  displayStories(GLOBAL_STORIES.filter(s => s.toLowerCase().includes(v)));
});

function loadStory(story) {

  document.getElementById("content").innerHTML = "";

  let chapters = {};

  GLOBAL_PATHS.forEach(path => {
    if(path.startsWith(`stories/${story}/`)) {
      let parts = path.split("/");
      if(parts.length >= 3) chapters[parts[2]] = true;
    }
  });

  Object.keys(chapters).forEach(chap => {

    let div = document.createElement("div");
    div.className = "chapter";

    let title = document.createElement("div");
    title.className = "chapterTitle";
    title.innerText = `Chapter ${chap}`;
    div.appendChild(title);

    let images = GLOBAL_PATHS.filter(p =>
      p.startsWith(`stories/${story}/${chap}/`) &&
      (p.endsWith(".jpg") || p.endsWith(".png") || p.endsWith(".webp"))
    );

    images.forEach(path => {
      let img = document.createElement("img");
      img.src = `https://raw.githubusercontent.com/${USER}/${REPO}/main/${path}`;
      div.appendChild(img);
    });

    if(images.length === 0) {
      let pdf = document.createElement("iframe");
      pdf.src = `https://github.com/${USER}/${REPO}/raw/main/stories/${story}/${chap}/${chap}.pdf`;
      div.appendChild(pdf);
    }

    document.getElementById("content").appendChild(div);
  });
}

// -------------------- ADMIN --------------------

document.getElementById("adminButton").onclick = () => {
  let pass = prompt("Admin password?");
  if(pass === "Sawyer0325") {
    document.getElementById("adminPanel").style.display = "block";
  }
}

function closeAdmin() {
  document.getElementById("adminPanel").style.display = "none";
}

// -------------------- UPLOAD --------------------

function toBase64(file) {
  return new Promise(res => {
    let r = new FileReader();
    r.onload = () => res(r.result.split(",")[1]);
    r.readAsDataURL(file);
  });
}

async function uploadChapter() {

  let story = document.getElementById("storyName").value;
  let chapter = document.getElementById("chapterName").value;
  let files = document.getElementById("imageUpload").files;

  for(let i=0;i<files.length;i++) {

    let base64 = await toBase64(files[i]);

    let path = `stories/${story}/${chapter}/${i+1}.jpg`;

    await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${path}`, {
      method:"PUT",
      headers:{
        Authorization:`token ${GITHUB_TOKEN}`,
        "Content-Type":"application/json"
      },
      body: JSON.stringify({
        message:`upload`,
        content: base64
      })
    });

  }

  alert("Uploaded");
  loadStories();
}

// -------------------- DELETE SYSTEM --------------------

async function getFile(path){
  let r = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${path}`,{
    headers:{Authorization:`token ${GITHUB_TOKEN}`}
  });
  return r.json();
}

async function deleteFile(path, sha){
  await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${path}`,{
    method:"DELETE",
    headers:{
      Authorization:`token ${GITHUB_TOKEN}`,
      "Content-Type":"application/json"
    },
    body: JSON.stringify({
      message:"delete",
      sha: sha
    })
  });
}

async function deleteChapterUI(){
  let story = document.getElementById("storyName").value;
  let chapter = document.getElementById("chapterName").value;

  let files = GLOBAL_PATHS.filter(p => p.startsWith(`stories/${story}/${chapter}/`));

  for(let f of files){
    let info = await getFile(f);
    await deleteFile(f, info.sha);
  }

  alert("Chapter deleted");
  loadStories();
}

async function deleteStoryUI(){
  let story = document.getElementById("storyName").value;

  let files = GLOBAL_PATHS.filter(p => p.startsWith(`stories/${story}/`));

  for(let f of files){
    let info = await getFile(f);
    await deleteFile(f, info.sha);
  }

  alert("Story deleted");
  loadStories();
}

loadStories();

</script>

</body>
</html>
